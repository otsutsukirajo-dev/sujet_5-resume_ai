<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résumé AI — Inscription</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <div class="brand-mark">
            <div class="rail__brand-icon"><i class="fa-solid fa-file-lines"></i></div>
            <div class="brand-mark__name">Résumé <em>AI</em></div>
        </div>

        <h1>Créer un compte</h1>
        <p class="sub">Quelques secondes suffisent pour commencer.</p>

        <form id="register-form" novalidate>
            <div class="field">
                <label class="label" for="email">Email</label>
                <input type="email" id="email" placeholder="vous@exemple.com" required>
            </div>
            <div class="field">
                <label class="label" for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="8+ car., 1 majuscule, 1 chiffre" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;" id="submit-btn">S'inscrire</button>
            <p class="error-text" id="form-error"></p>
        </form>

        <div class="auth-footer">
            Déjà un compte ? <a href="login.html">Se connecter</a>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errorEl = document.getElementById('form-error');
    errorEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Création...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const res = await AuthService.register(email, password);
    if (res.success) {
        window.location.href = 'login.html';
    } else {
        errorEl.textContent = res.error;
        btn.disabled = false;
        btn.textContent = "S'inscrire";
    }
});
</script>
</body>
</html>
