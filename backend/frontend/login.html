<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résumé AI — Connexion</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <div class="brand-mark">
            <div class="brand-mark__icon">R</div>
            <div class="brand-mark__name">Résumé <em>AI</em></div>
        </div>

        <h1>Content de vous revoir</h1>
        <p class="sub">Connectez-vous pour reprendre vos analyses.</p>

        <form id="login-form" novalidate>
            <div class="field">
                <label class="label" for="email">Email</label>
                <input type="email" id="email" placeholder="vous@exemple.com" required>
            </div>
            <div class="field">
                <label class="label" for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;" id="submit-btn">Se connecter</button>
            <p class="error-text" id="form-error"></p>
        </form>

        <div class="auth-footer">
            Pas encore de compte ? <a href="register.html">Créer un compte</a>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errorEl = document.getElementById('form-error');
    errorEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Connexion...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const res = await AuthService.login(email, password);
    if (res.success) {
        window.location.href = 'dashboard.html';
    } else {
        errorEl.textContent = res.error;
        btn.disabled = false;
        btn.textContent = 'Se connecter';
    }
});
</script>
</body>
</html>
