<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résumé AI — Connexion</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- <link rel="stylesheet" href="css/style.css"> -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-900">Connexion</h2>
            <p class="text-sm text-gray-500 mt-2">Accédez à votre espace d'analyse AI</p>
        </div>
        <form id="login-form" class="space-y-5">
            <div>
               <label class="block text-sm font-medium text-gray-700">Email</label>
               <input type="email" id="username" required placeholder="Entrez votre email" ...>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Mot de passe</label>
                <input type="password" id="password" required placeholder="Entrez votre mot de passe" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500">
            </div>
            <button type="submit" class="w-full py-2.5 px-4 rounded-lg text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 transition">
                Se connecter
            </button>
        </form>
        <div class="mt-6 text-center">
            <a href="register.html" class="text-sm text-indigo-600 hover:underline">Pas encore de compte ? S'inscrire</a>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const res = await AuthService.login(u, p);
            if(res.success) window.location.href = 'dashboard.html';
            else alert(res.error);
        });
    </script>
</body>
</html>
